<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yu-Gi-Oh! Card Realm</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Rajdhani', sans-serif; background: #08080f; }

  .cinzel { font-family: 'Cinzel', serif; }
  .gold { background: linear-gradient(135deg, #d4af37, #f0d060); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* Intro */
  #intro { position: fixed; inset: 0; background: #000; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: opacity .7s; }
  #intro.fade { opacity: 0; pointer-events: none; }

  .eye svg { filter: drop-shadow(0 0 18px #d4af37); animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{filter:drop-shadow(0 0 10px #d4af37)} 50%{filter:drop-shadow(0 0 35px #f0d060)} }

  .ring { position: absolute; border-radius: 50%; border: 1.5px solid #d4af37; animation: expand 4s ease-out infinite; opacity: 0; }
  @keyframes expand { 0%{width:160px;height:160px;opacity:.7;border-color:#d4af37} 100%{width:700px;height:700px;opacity:0;border-color:#7c3aed} }

  /* Stars */
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d,3s) ease-in-out infinite var(--dl,0s); }
  @keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:1} }

  /* Cards */
  .card { background: #0f0f1e; border: 1px solid rgba(212,175,55,.2); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform .35s cubic-bezier(.175,.885,.32,1.275), box-shadow .35s, border-color .3s; animation: appear .4s ease forwards; opacity: 0; }
  .card:hover { transform: translateY(-7px) scale(1.02); border-color: #d4af37; box-shadow: 0 18px 45px rgba(0,0,0,.5), 0 0 28px rgba(212,175,55,.3); }
  @keyframes appear { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

  .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; transition: transform .4s; }
  .card:hover img { transform: scale(1.07); }

  /* Shimmer */
  .shimmer { border-radius: 12px; aspect-ratio: 3/4; background: linear-gradient(90deg,#111122 25%,#1a1a33 50%,#111122 75%); background-size: 200%; animation: sh 1.5s infinite; }
  @keyframes sh { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  /* Modal */
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 40; display: none; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(6px); }
  #modal.open { display: flex; }
  .modal-box { background: #0f0f1e; border: 1px solid rgba(212,175,55,.4); border-radius: 18px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; animation: pop .35s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes pop { from{transform:scale(.88) translateY(24px);opacity:0} to{transform:none;opacity:1} }

  /* Search */
  input { background: rgba(255,255,255,.05); border: 1px solid rgba(212,175,55,.3); border-radius: 9999px; color: #fff; outline: none; transition: border-color .3s, box-shadow .3s; }
  input:focus { border-color: #d4af37; box-shadow: 0 0 18px rgba(212,175,55,.2); }
  input::placeholder { color: #4a5568; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #08080f; } ::-webkit-scrollbar-thumb { background: #d4af3750; border-radius: 3px; }

  /* Filter active */
  .f-btn.active { background: rgba(212,175,55,.18); border-color: rgba(212,175,55,.6) !important; color: #d4af37 !important; }
</style>
</head>
<body class="text-slate-200 min-h-screen">

<!-- INTRO -->
<div id="intro">
  <div id="stars"></div>
  <div class="ring" style="animation-delay:0s"></div>
  <div class="ring" style="animation-delay:1.3s"></div>
  <div class="ring" style="animation-delay:2.6s"></div>

  <div class="eye mb-6 relative z-10">
    <svg width="140" height="140" viewBox="0 0 200 200">
      <polygon points="100,8 192,172 8,172" fill="none" stroke="#d4af37" stroke-width="3"/>
      <ellipse cx="100" cy="116" rx="44" ry="34" fill="none" stroke="#d4af37" stroke-width="2"/>
      <ellipse cx="100" cy="116" rx="19" ry="19" fill="#d4af37" opacity=".9"/>
      <ellipse cx="100" cy="116" rx="9" ry="9" fill="#000"/>
      <ellipse cx="104" cy="111" rx="3" ry="3" fill="#fff"/>
      <line x1="100" y1="82" x2="100" y2="62" stroke="#d4af37" stroke-width="1.5"/>
      <line x1="144" y1="116" x2="164" y2="116" stroke="#d4af37" stroke-width="1.5"/>
      <line x1="56" y1="116" x2="36" y2="116" stroke="#d4af37" stroke-width="1.5"/>
    </svg>
  </div>

  <h1 class="cinzel gold text-5xl md:text-7xl font-black mb-2 relative z-10 text-center">YU-GI-OH!</h1>
  <p class="text-slate-500 tracking-widest text-sm mb-10 relative z-10">CARD REALM DATABASE</p>
  <button onclick="startApp()" class="cinzel relative z-10 border-2 border-yellow-600 text-yellow-500 px-8 py-3 text-sm font-bold tracking-widest hover:bg-yellow-600 hover:text-black transition-all duration-300">
    ⚡ INICIAR DUELO ⚡
  </button>
  <p class="absolute bottom-5 text-slate-700 text-xs tracking-widest">CLIQUE PARA ENTRAR</p>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <!-- Header -->
  <header class="sticky top-0 z-30 bg-[#08080f]/95 backdrop-blur border-b border-yellow-900/30 px-4 py-3 flex flex-wrap items-center gap-3">
    <span class="cinzel gold text-xl font-black">⚔️ Card Realm</span>
    <input id="search" type="text" placeholder="Buscar carta..." class="flex-1 min-w-[180px] max-w-sm px-4 py-2 text-sm" oninput="onSearch()">
    <div class="flex gap-2 flex-wrap" id="filters">
      <button class="f-btn active border border-slate-700 rounded-full px-3 py-1 text-xs text-slate-400 hover:text-yellow-400 transition-all" data-t="">Todas</button>
      <button class="f-btn border border-red-900/50 rounded-full px-3 py-1 text-xs text-red-400 hover:border-red-500 transition-all" data-t="Monster">Monstro</button>
      <button class="f-btn border border-green-900/50 rounded-full px-3 py-1 text-xs text-green-400 hover:border-green-500 transition-all" data-t="Spell">Magia</button>
      <button class="f-btn border border-purple-900/50 rounded-full px-3 py-1 text-xs text-purple-400 hover:border-purple-500 transition-all" data-t="Trap">Armadilha</button>
    </div>
  </header>

  <!-- Hero stats -->
  <div class="text-center py-8 px-4">
    <h2 class="cinzel gold text-3xl font-black mb-1">Duel Card Database</h2>
    <p class="text-slate-500 text-sm mb-6">Explore o universo Yu-Gi-Oh! — mais de 12.000 cartas</p>
    <div class="flex justify-center gap-8 flex-wrap">
      <div><span id="st-total" class="cinzel text-yellow-400 text-3xl font-bold block">—</span><span class="text-slate-500 text-xs uppercase tracking-widest">Total</span></div>
      <div><span id="st-mon" class="cinzel text-red-400 text-3xl font-bold block">—</span><span class="text-slate-500 text-xs uppercase tracking-widest">Monstros</span></div>
      <div><span id="st-spell" class="cinzel text-green-400 text-3xl font-bold block">—</span><span class="text-slate-500 text-xs uppercase tracking-widest">Magias</span></div>
      <div><span id="st-trap" class="cinzel text-purple-400 text-3xl font-bold block">—</span><span class="text-slate-500 text-xs uppercase tracking-widest">Armadilhas</span></div>
    </div>
  </div>

  <!-- Grid -->
  <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 px-4 pb-4"></div>

  <!-- Load more -->
  <div class="text-center py-8">
    <button id="load-btn" onclick="loadMore()" class="cinzel border-2 border-yellow-700 text-yellow-500 px-8 py-3 text-sm font-bold tracking-widest hover:bg-yellow-700 hover:text-black transition-all disabled:opacity-40 rounded-full">
      ⚡ Carregar Mais
    </button>
  </div>
</div>

<!-- Modal -->
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="flex items-start justify-between p-5 border-b border-yellow-900/30 bg-gradient-to-r from-yellow-950/30 to-purple-950/20">
      <div>
        <p id="m-type" class="text-xs uppercase tracking-widest mb-1 text-slate-500"></p>
        <h2 id="m-name" class="cinzel text-yellow-400 text-xl font-bold"></h2>
      </div>
      <button onclick="closeModal()" class="text-slate-500 hover:text-red-400 text-xl ml-4 mt-1">✕</button>
    </div>
    <div id="m-body" class="p-5 grid gap-4 sm:grid-cols-[180px_1fr]"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────
const API = 'https://db.ygoprodeck.com/api/v7/cardinfo.php';
let offset = 0, filter = '', search = '', timer;
const N = 24;

// ── Intro ──────────────────────────────────────────
(function stars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    const sz = Math.random() * 2.5 + .5;
    s.className = 'star';
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*4}s`;
    c.appendChild(s);
  }
})();

function startApp() {
  const intro = document.getElementById('intro');
  intro.classList.add('fade');
  setTimeout(() => { intro.style.display = 'none'; document.getElementById('app').classList.remove('hidden'); fetchCards(true); }, 700);
}
document.getElementById('intro').addEventListener('click', startApp);

// ── Fetch ──────────────────────────────────────────
async function fetchCards(reset = false) {
  if (reset) { offset = 0; showSkeletons(); }
  const btn = document.getElementById('load-btn');
  btn.disabled = true; btn.textContent = '⏳ Carregando...';

  const p = new URLSearchParams({ num: N, offset, sort: 'name' });
  if (search) p.set('fname', search);
  if (filter === 'Monster') p.set('type', 'Normal Monster,Effect Monster,Fusion Monster,Ritual Monster,Synchro Monster,XYZ Monster,Link Monster,Pendulum Monster');
  else if (filter === 'Spell') p.set('type', 'Spell Card');
  else if (filter === 'Trap') p.set('type', 'Trap Card');

  try {
    const r = await fetch(`${API}?${p}`);
    const d = await r.json();
    const cards = d.data || [];
    if (reset) document.getElementById('grid').innerHTML = '';
    cards.forEach((c, i) => {
      const el = makeCard(c);
      el.style.animationDelay = `${i * 0.03}s`;
      document.getElementById('grid').appendChild(el);
    });
    offset += cards.length;
    btn.textContent = cards.length < N ? '✅ Fim da coleção' : '⚡ Carregar Mais';
    btn.disabled = cards.length < N;

    // Stats (only on first load, no filter)
    if (reset && !filter && !search) fetchStats(d.meta?.total_rows);
  } catch { btn.textContent = '❌ Erro — tentar novamente'; btn.disabled = false; }
}

async function fetchStats(total) {
  document.getElementById('st-total').textContent = (total || 0).toLocaleString('pt-BR');
  const types = [['Monster', 'st-mon'], ['Spell', 'st-spell'], ['Trap', 'st-trap']];
  const typeMap = { Monster: 'Normal Monster,Effect Monster,Fusion Monster,Ritual Monster,Synchro Monster,XYZ Monster,Link Monster,Pendulum Monster', Spell: 'Spell Card', Trap: 'Trap Card' };
  types.forEach(async ([t, id]) => {
    try {
      const r = await fetch(`${API}?num=1&offset=0&type=${encodeURIComponent(typeMap[t])}`);
      const d = await r.json();
      document.getElementById(id).textContent = (d.meta?.total_rows || 0).toLocaleString('pt-BR');
    } catch {}
  });
}

// ── Cards ──────────────────────────────────────────
function makeCard(c) {
  const tc = typeColor(c.type);
  const img = c.card_images?.[0]?.image_url_small || '';
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `
    <div class="relative overflow-hidden" style="aspect-ratio:3/4;background:#050510">
      ${img ? `<img src="${img}" alt="${c.name}" loading="lazy">` : ''}
      <span class="absolute top-2 right-2 text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:${tc.bg};color:${tc.fg}">${tc.label}</span>
    </div>
    <div class="p-2">
      <p class="cinzel text-yellow-400 text-xs font-bold truncate">${c.name}</p>
      <p class="text-slate-500 text-[11px] truncate">${c.race || ''}${c.attribute ? ' · '+c.attribute : ''}</p>
      ${c.atk != null ? `<div class="flex gap-1 mt-1"><span class="text-[10px] flex-1 text-center rounded bg-red-950/50 text-red-400 border border-red-900/40">⚔️ ${c.atk}</span><span class="text-[10px] flex-1 text-center rounded bg-blue-950/50 text-blue-400 border border-blue-900/40">🛡 ${c.def}</span></div>` : ''}
    </div>`;
  d.onclick = () => openModal(c);
  return d;
}

function typeColor(t = '') {
  const l = t.toLowerCase();
  if (l.includes('monster')) return { bg: 'rgba(239,68,68,.2)', fg: '#f87171', label: 'Monstro' };
  if (l.includes('spell'))   return { bg: 'rgba(34,197,94,.2)', fg: '#4ade80', label: 'Magia' };
  if (l.includes('trap'))    return { bg: 'rgba(168,85,247,.2)', fg: '#c084fc', label: 'Armadilha' };
  return { bg: 'rgba(148,163,184,.2)', fg: '#94a3b8', label: t };
}

function showSkeletons() {
  document.getElementById('grid').innerHTML = Array(12).fill('<div class="shimmer"></div>').join('');
}

// ── Modal ──────────────────────────────────────────
function openModal(c) {
  document.getElementById('m-name').textContent = c.name;
  document.getElementById('m-type').textContent = c.type || '';
  const img = c.card_images?.[0]?.image_url || '';
  const price = parseFloat(c.card_prices?.[0]?.tcgplayer_price || 0);
  document.getElementById('m-body').innerHTML = `
    <div class="flex flex-col items-center gap-3">
      ${img ? `<img src="${img}" class="w-40 rounded-lg border border-yellow-800/40 shadow-xl" alt="${c.name}">` : ''}
      ${price > 0 ? `<span class="text-xs text-green-400 border border-green-900/40 rounded-full px-3 py-1">💰 US$ ${price.toFixed(2)}</span>` : ''}
    </div>
    <div class="flex flex-col gap-3">
      <div class="grid grid-cols-2 gap-2">
        ${c.atk != null ? `<div class="rounded-lg bg-red-950/30 border border-red-900/30 p-2 text-center"><p class="text-xs text-slate-500">⚔️ ATK</p><p class="cinzel text-red-400 text-lg font-bold">${c.atk}</p></div><div class="rounded-lg bg-blue-950/30 border border-blue-900/30 p-2 text-center"><p class="text-xs text-slate-500">🛡 DEF</p><p class="cinzel text-blue-400 text-lg font-bold">${c.def}</p></div>` : ''}
        ${c.level ? `<div class="rounded-lg bg-yellow-950/30 border border-yellow-900/30 p-2 text-center"><p class="text-xs text-slate-500">⭐ Nível</p><p class="cinzel text-yellow-400 text-lg font-bold">${c.level}</p></div>` : ''}
        ${c.attribute ? `<div class="rounded-lg bg-purple-950/30 border border-purple-900/30 p-2 text-center"><p class="text-xs text-slate-500">🌀 Atributo</p><p class="cinzel text-purple-400 text-sm font-bold">${c.attribute}</p></div>` : ''}
      </div>
      ${c.archetype ? `<p class="text-xs text-slate-500">Arquétipo: <span class="text-purple-400">${c.archetype}</span></p>` : ''}
      ${c.desc ? `<p class="text-sm text-slate-400 leading-relaxed italic bg-white/[.03] rounded-lg p-3 border border-white/[.04]">${c.desc}</p>` : ''}
    </div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => e.key === 'Escape' && closeModal());

// ── Search / Filter ────────────────────────────────
function onSearch() {
  clearTimeout(timer);
  search = document.getElementById('search').value.trim();
  timer = setTimeout(() => fetchCards(true), 450);
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filter = btn.dataset.t;
  fetchCards(true);
});

function loadMore() { fetchCards(false); }
</script>
</body>
</html>
